  <ellipse cx="200" cy="165" rx="126" ry="80" fill="none" stroke="#6b4f10" stroke-width="12"/>
  <ellipse cx="200" cy="165" rx="112" ry="68" fill="none" stroke="#c49030" stroke-width="12"/>
  <ellipse cx="200" cy="165" rx="98" ry="56" fill="none" stroke="#8b6914" stroke-width="12"/>
  <ellipse cx="200" cy="165" rx="84" ry="44" fill="none" stroke="#a07820" stroke-width="12"/>
  <ellipse cx="200" cy="165" rx="70" ry="32" fill="none" stroke="#6b4f10" stroke-width="12"/>
  <ellipse cx="200" cy="165" rx="56" ry="20" fill="none" stroke="#c49030" stroke-width="12"/>
  <ellipse cx="200" cy="165" rx="40" ry="10" fill="#8b6914"/>
