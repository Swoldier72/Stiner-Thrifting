<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg-grad-a006" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0d8"/>
      <stop offset="100%" stop-color="#b8c898"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg-grad-a006)"/>
  <!-- Bookmark shape -->
  <path d="M165,50 L235,50 L235,260 L200,240 L165,260 Z" fill="#f5f0e0"/>
  <path d="M165,50 L235,50 L235,260 L200,240 L165,260 Z" fill="none" stroke="#c8b878" stroke-width="2"/>
  <!-- Laminate sheen -->
  <path d="M168,53 L175,53 L175,257 L168,253 Z" fill="rgba(255,255,255,0.3)"/>
  <!-- Pressed flowers -->
  <!-- Flower 1 - lavender -->
  <ellipse cx="192" cy="100" rx="8" ry="12" fill="#c8a0d8" transform="rotate(-20 192 100)"/>
  <ellipse cx="208" cy="95" rx="7" ry="11" fill="#c8a0d8" transform="rotate(15 208 95)"/>
  <ellipse cx="200" cy="88" rx="7" ry="11" fill="#b888c8" transform="rotate(-5 200 88)"/>
  <ellipse cx="185" cy="90" rx="6" ry="10" fill="#d0b0e0" transform="rotate(25 185 90)"/>
  <circle cx="200" cy="100" r="5" fill="#f5e642"/>
  <!-- Stem 1 -->
  <line x1="200" y1="105" x2="200" y2="130" stroke="#5a8a3a" stroke-width="2"/>
  <!-- Leaf 1 -->
  <ellipse cx="193" cy="118" rx="8" ry="4" fill="#5a8a3a" transform="rotate(-30 193 118)"/>
  <!-- Flower 2 - small pink -->
  <circle cx="195" cy="160" r="6" fill="#e87aaa"/>
  <circle cx="188" cy="155" r="5" fill="#e87aaa"/>
  <circle cx="202" cy="155" r="5" fill="#e87aaa"/>
  <circle cx="195" cy="150" r="5" fill="#e87aaa"/>
  <circle cx="195" cy="160" r="4" fill="#fff0a0"/>
  <!-- Stem 2 -->
  <line x1="195" y1="164" x2="195" y2="185" stroke="#5a8a3a" stroke-width="1.5"/>
  <!-- Flower 3 - tiny yellow -->
  <circle cx="210" cy="195" r="5" fill="#f5e642"/>
  <circle cx="204" cy="191" r="4" fill="#f5e642"/>
  <circle cx="216" cy="191" r="4" fill="#f5e642"/>
  <circle cx="210" cy="187" r="4" fill="#f5e642"/>
  <circle cx="210" cy="195" r="3" fill="#e67e22"/>
  <!-- Stem 3 -->
  <line x1="210" y1="199" x2="205" y2="215" stroke="#5a8a3a" stroke-width="1.5"/>
  <!-- Small leaf -->
  <ellipse cx="200" cy="210" rx="6" ry="3" fill="#5a8a3a" transform="rotate(-20 200 210)"/>
  <!-- Ribbon at top -->
  <rect x="190" y="48" width="20" height="8" rx="2" fill="#e87aaa"/>
  <!-- Label -->
  <rect x="100" y="255" width="200" height="30" rx="4" fill="rgba(0,0,0,0.25)"/>
  <text x="200" y="275" font-family="sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">Pressed Flower Bookmark</text>
</svg>
