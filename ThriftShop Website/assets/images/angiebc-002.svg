<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="tiedye-002" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e642"/>
      <stop offset="20%" stop-color="#f5a623"/>
      <stop offset="40%" stop-color="#e74c3c"/>
      <stop offset="60%" stop-color="#9b59b6"/>
      <stop offset="80%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#e8e0d8"/>
  <!-- T-shirt shape with tie-dye fill -->
  <!-- Left sleeve -->
  <polygon points="120,90 155,90 165,130 130,135" fill="url(#tiedye-002)"/>
  <!-- Right sleeve -->
  <polygon points="280,90 245,90 235,130 270,135" fill="url(#tiedye-002)"/>
  <!-- Body -->
  <path d="M120,90 L155,90 Q200,110 245,90 L280,90 L270,135 L235,130 L235,230 L165,230 L165,130 L130,135 Z" fill="url(#tiedye-002)" stroke="rgba(0,0,0,0.1)" stroke-width="1.5"/>
  <!-- Mountain silhouette stitched on -->
  <polygon points="175,210 200,165 225,210" fill="rgba(0,0,0,0.35)"/>
  <polygon points="185,210 210,175 235,210" fill="rgba(0,0,0,0.25)"/>
  <!-- Snow caps -->
  <polygon points="196,170 200,165 204,170" fill="rgba(255,255,255,0.7)"/>
  <polygon points="206,179 210,175 214,179" fill="rgba(255,255,255,0.6)"/>
  <!-- Sun above mountains -->
  <circle cx="200" cy="148" r="12" fill="rgba(255,240,100,0.7)"/>
  <!-- Sun rays -->
  <line x1="200" y1="132" x2="200" y2="128" stroke="rgba(255,240,100,0.7)" stroke-width="2"/>
  <line x1="211" y1="137" x2="214" y2="134" stroke="rgba(255,240,100,0.7)" stroke-width="2"/>
  <line x1="216" y1="148" x2="220" y2="148" stroke="rgba(255,240,100,0.7)" stroke-width="2"/>
  <line x1="189" y1="137" x2="186" y2="134" stroke="rgba(255,240,100,0.7)" stroke-width="2"/>
  <line x1="184" y1="148" x2="180" y2="148" stroke="rgba(255,240,100,0.7)" stroke-width="2"/>
  <!-- Label -->
  <rect x="110" y="255" width="180" height="30" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="200" y="275" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Mountain Sunrise Shirt</text>
</svg>
