<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg-grad-005" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#9a9a9a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg-grad-005)"/>
  <!-- Walkman body -->
  <rect x="130" y="80" width="140" height="150" rx="12" fill="#e8e0c8"/>
  <!-- Yellow accent strip -->
  <rect x="130" y="80" width="140" height="40" rx="12" fill="#f0c020"/>
  <rect x="130" y="108" width="140" height="12" fill="#f0c020"/>
  <!-- Cassette window -->
  <rect x="148" y="130" width="104" height="60" rx="6" fill="#333"/>
  <rect x="152" y="134" width="96" height="52" rx="4" fill="#1a1a2e"/>
  <!-- Cassette reels -->
  <circle cx="178" cy="160" r="18" fill="#2a2a3e"/>
  <circle cx="178" cy="160" r="10" fill="#444"/>
  <circle cx="178" cy="160" r="4" fill="#888"/>
  <circle cx="222" cy="160" r="18" fill="#2a2a3e"/>
  <circle cx="222" cy="160" r="10" fill="#444"/>
  <circle cx="222" cy="160" r="4" fill="#888"/>
  <!-- Tape line -->
  <path d="M178,142 Q200,138 222,142" stroke="#888" stroke-width="2" fill="none"/>
  <!-- Buttons -->
  <rect x="145" y="200" width="22" height="16" rx="3" fill="#555"/>
  <rect x="172" y="200" width="22" height="16" rx="3" fill="#555"/>
  <rect x="199" y="200" width="22" height="16" rx="3" fill="#555"/>
  <rect x="226" y="200" width="22" height="16" rx="3" fill="#f0c020"/>
  <!-- Play symbol on last button -->
  <polygon points="231,205 231,213 239,209" fill="#333"/>
  <!-- Headphone jack -->
  <circle cx="155" cy="88" r="5" fill="#333"/>
  <!-- Sony label -->
  <rect x="155" y="95" width="50" height="12" rx="2" fill="#333"/>
  <text x="180" y="105" font-family="sans-serif" font-size="9" fill="#f0c020" text-anchor="middle" font-weight="bold">SONY</text>
  <!-- Label -->
  <rect x="115" y="245" width="170" height="30" rx="4" fill="rgba(0,0,0,0.35)"/>
  <text x="200" y="265" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Sony Walkman</text>
</svg>
