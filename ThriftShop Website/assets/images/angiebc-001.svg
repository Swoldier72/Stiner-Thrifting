<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg-grad-a001" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e0d8c8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg-grad-a001)"/>
  <!-- T-shirt shape -->
  <!-- Left sleeve -->
  <polygon points="120,90 155,90 165,130 130,135" fill="#f8f8f0"/>
  <!-- Right sleeve -->
  <polygon points="280,90 245,90 235,130 270,135" fill="#f8f8f0"/>
  <!-- Collar -->
  <path d="M155,90 Q200,110 245,90" stroke="#e0d8c0" stroke-width="2" fill="none"/>
  <!-- Body -->
  <rect x="155" y="90" width="90" height="140" rx="4" fill="#f8f8f0"/>
  <!-- Shirt outline -->
  <path d="M120,90 L155,90 Q200,110 245,90 L280,90 L270,135 L235,130 L235,230 L165,230 L165,130 L130,135 Z" fill="#f8f8f0" stroke="#d8d0b8" stroke-width="2"/>
  <!-- Wildflower design -->
  <!-- Stem 1 -->
  <line x1="190" y1="200" x2="190" y2="155" stroke="#5a8a3a" stroke-width="2"/>
  <line x1="190" y1="175" x2="180" y2="165" stroke="#5a8a3a" stroke-width="1.5"/>
  <!-- Flower 1 - purple -->
  <circle cx="190" cy="152" r="5" fill="#9b59b6"/>
  <circle cx="183" cy="148" r="4" fill="#9b59b6"/>
  <circle cx="197" cy="148" r="4" fill="#9b59b6"/>
  <circle cx="190" cy="143" r="4" fill="#9b59b6"/>
  <circle cx="190" cy="152" r="4" fill="#f5e642"/>
  <!-- Stem 2 -->
  <line x1="205" y1="200" x2="205" y2="160" stroke="#5a8a3a" stroke-width="2"/>
  <!-- Flower 2 - pink -->
  <circle cx="205" cy="157" r="5" fill="#e74c8b"/>
  <circle cx="198" cy="153" r="4" fill="#e74c8b"/>
  <circle cx="212" cy="153" r="4" fill="#e74c8b"/>
  <circle cx="205" cy="148" r="4" fill="#e74c8b"/>
  <circle cx="205" cy="157" r="4" fill="#fff"/>
  <!-- Stem 3 -->
  <line x1="178" y1="200" x2="178" y2="168" stroke="#5a8a3a" stroke-width="2"/>
  <!-- Flower 3 - orange -->
  <circle cx="178" cy="165" r="4" fill="#e67e22"/>
  <circle cx="172" cy="162" r="3.5" fill="#e67e22"/>
  <circle cx="184" cy="162" r="3.5" fill="#e67e22"/>
  <circle cx="178" cy="158" r="3.5" fill="#e67e22"/>
  <circle cx="178" cy="165" r="3" fill="#f5e642"/>
  <!-- Leaves -->
  <ellipse cx="185" cy="180" rx="6" ry="3" fill="#5a8a3a" transform="rotate(-30 185 180)"/>
  <ellipse cx="208" cy="178" rx="6" ry="3" fill="#5a8a3a" transform="rotate(30 208 178)"/>
  <!-- Label -->
  <rect x="115" y="255" width="170" height="30" rx="4" fill="rgba(0,0,0,0.25)"/>
  <text x="200" y="275" font-family="sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">Wildflower Tee</text>
</svg>
