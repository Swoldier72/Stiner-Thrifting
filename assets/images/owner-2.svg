<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg-owner2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8c0a0"/>
      <stop offset="100%" stop-color="#b07840"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg-owner2)"/>
  <!-- Shelving / store background -->
  <rect x="0" y="180" width="300" height="10" fill="rgba(0,0,0,0.2)"/>
  <!-- Items on shelf suggestion -->
  <rect x="20" y="155" width="30" height="25" rx="3" fill="rgba(0,0,0,0.15)"/>
  <rect x="60" y="160" width="20" height="20" rx="3" fill="rgba(0,0,0,0.12)"/>
  <rect x="240" y="150" width="40" height="30" rx="3" fill="rgba(0,0,0,0.12)"/>
  <!-- Person silhouette - slightly different pose (arms out, arranging items) -->
  <!-- Head -->
  <circle cx="150" cy="90" r="36" fill="#c49060"/>
  <!-- Hair - longer style -->
  <ellipse cx="150" cy="68" rx="36" ry="18" fill="#6b3a18"/>
  <ellipse cx="118" cy="85" rx="10" ry="28" fill="#6b3a18"/>
  <ellipse cx="182" cy="85" rx="10" ry="28" fill="#6b3a18"/>
  <ellipse cx="150" cy="120" rx="8" ry="12" fill="#6b3a18"/>
  <!-- Face -->
  <circle cx="150" cy="93" r="28" fill="#c49060"/>
  <!-- Eyes -->
  <ellipse cx="141" cy="88" rx="4.5" ry="5.5" fill="#4a2c10"/>
  <ellipse cx="159" cy="88" rx="4.5" ry="5.5" fill="#4a2c10"/>
  <circle cx="142" cy="87" r="1.8" fill="white"/>
  <circle cx="160" cy="87" r="1.8" fill="white"/>
  <!-- Smile - bigger -->
  <path d="M138,104 Q150,116 162,104" stroke="#8b5e3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="133" cy="100" r="8" fill="#e8a080" opacity="0.4"/>
  <circle cx="167" cy="100" r="8" fill="#e8a080" opacity="0.4"/>
  <!-- Neck -->
  <rect x="141" y="122" width="18" height="18" fill="#c49060"/>
  <!-- Body with arms extended (arranging items) -->
  <path d="M85,300 Q85,195 115,182 Q132,175 150,175 Q168,175 185,182 Q215,195 215,300 Z" fill="#9a6838"/>
  <!-- Left arm extended -->
  <path d="M100,210 Q70,200 50,195" stroke="#9a6838" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Right arm extended -->
  <path d="M200,210 Q230,200 250,195" stroke="#9a6838" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Shirt detail -->
  <polygon points="141,182 150,196 159,182" fill="#f5e6d3"/>
  <!-- Label -->
  <rect x="60" y="265" width="180" height="28" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="150" y="284" font-family="sans-serif" font-size="13" fill="#f5e6d3" text-anchor="middle" font-weight="bold">Curating Finds</text>
</svg>
