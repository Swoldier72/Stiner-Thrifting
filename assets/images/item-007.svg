<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg-grad-007" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde8c8"/>
      <stop offset="100%" stop-color="#f5b060"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg-grad-007)"/>
  <!-- Jar body -->
  <ellipse cx="200" cy="230" rx="70" ry="20" fill="#c0392b" opacity="0.4"/>
  <rect x="140" y="130" width="120" height="100" rx="20" fill="#e74c3c"/>
  <!-- Jar highlight -->
  <rect x="148" y="138" width="30" height="80" rx="10" fill="rgba(255,255,255,0.2)"/>
  <!-- Jar lid -->
  <ellipse cx="200" cy="130" rx="65" ry="16" fill="#c0392b"/>
  <ellipse cx="200" cy="124" rx="65" ry="16" fill="#e74c3c"/>
  <!-- Lid knob -->
  <ellipse cx="200" cy="108" rx="18" ry="8" fill="#c0392b"/>
  <ellipse cx="200" cy="104" rx="18" ry="8" fill="#e74c3c"/>
  <!-- Rooster design on jar -->
  <!-- Body -->
  <ellipse cx="200" cy="185" rx="22" ry="20" fill="#f5a623"/>
  <!-- Head -->
  <circle cx="218" cy="168" r="12" fill="#f5a623"/>
  <!-- Beak -->
  <polygon points="228,167 236,170 228,173" fill="#e67e22"/>
  <!-- Comb -->
  <polygon points="215,158 218,150 221,158" fill="#e74c3c"/>
  <polygon points="219,156 222,148 225,156" fill="#e74c3c"/>
  <!-- Eye -->
  <circle cx="221" cy="167" r="3" fill="#333"/>
  <circle cx="222" cy="166" r="1" fill="#fff"/>
  <!-- Tail feathers -->
  <path d="M178,178 Q165,165 168,155 Q175,170 180,175" fill="#27ae60"/>
  <path d="M178,185 Q162,178 162,165 Q172,178 178,182" fill="#2980b9"/>
  <!-- Legs -->
  <line x1="195" y1="205" x2="190" y2="220" stroke="#e67e22" stroke-width="3"/>
  <line x1="205" y1="205" x2="210" y2="220" stroke="#e67e22" stroke-width="3"/>
  <!-- Label -->
  <rect x="115" y="255" width="170" height="30" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="200" y="275" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Ceramic Cookie Jar</text>
</svg>
