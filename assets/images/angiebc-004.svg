<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg-grad-a004" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe0b0"/>
      <stop offset="100%" stop-color="#ff8c42"/>
    </linearGradient>
    <linearGradient id="mug-grad-a004" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c060"/>
      <stop offset="50%" stop-color="#e87030"/>
      <stop offset="100%" stop-color="#c04020"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg-grad-a004)"/>
  <!-- Mug body -->
  <path d="M150,100 L155,240 L245,240 L250,100 Z" rx="8" fill="url(#mug-grad-a004)"/>
  <rect x="150" y="100" width="100" height="10" rx="4" fill="#f5c060"/>
  <!-- Mug handle -->
  <path d="M250,140 Q290,140 290,175 Q290,210 250,210" stroke="#c04020" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M250,140 Q282,140 282,175 Q282,202 250,210" stroke="#e87030" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Sunrise design on mug -->
  <!-- Sky gradient bands -->
  <clipPath id="mug-clip">
    <path d="M152,112 L157,238 L243,238 L248,112 Z"/>
  </clipPath>
  <rect x="152" y="112" width="96" height="126" fill="#1a1a4e" clip-path="url(#mug-clip)"/>
  <rect x="152" y="175" width="96" height="63" fill="#c04020" clip-path="url(#mug-clip)"/>
  <rect x="152" y="195" width="96" height="43" fill="#e87030" clip-path="url(#mug-clip)"/>
  <rect x="152" y="215" width="96" height="23" fill="#f5a623" clip-path="url(#mug-clip)"/>
  <!-- Sun -->
  <circle cx="200" cy="185" r="22" fill="#f5e642" clip-path="url(#mug-clip)"/>
  <!-- Sun rays -->
  <line x1="200" y1="158" x2="200" y2="150" stroke="#f5e642" stroke-width="3" clip-path="url(#mug-clip)"/>
  <line x1="218" y1="163" x2="224" y2="157" stroke="#f5e642" stroke-width="3" clip-path="url(#mug-clip)"/>
  <line x1="182" y1="163" x2="176" y2="157" stroke="#f5e642" stroke-width="3" clip-path="url(#mug-clip)"/>
  <!-- Stars -->
  <circle cx="165" cy="130" r="2" fill="white" clip-path="url(#mug-clip)"/>
  <circle cx="235" cy="125" r="2" fill="white" clip-path="url(#mug-clip)"/>
  <circle cx="175" cy="145" r="1.5" fill="white" clip-path="url(#mug-clip)"/>
  <circle cx="225" cy="140" r="1.5" fill="white" clip-path="url(#mug-clip)"/>
  <!-- Steam -->
  <path d="M180,95 Q175,80 180,65" stroke="#ddd" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M200,92 Q195,77 200,62" stroke="#ddd" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M220,95 Q215,80 220,65" stroke="#ddd" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Label -->
  <rect x="110" y="255" width="180" height="30" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="200" y="275" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Sunrise Ceramic Mug</text>
</svg>
